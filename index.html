<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SES - STATUS (GitHub Version)</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Prompt', sans-serif; background-color: #f8f9fa; }
    .job-display { font-size: 2rem; font-weight: bold; color: #0d6efd; background: #e9ecef; border-radius: 10px; padding: 10px; margin: 10px 0; border: 2px solid #dee2e6; }
    .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; border-top: 1px solid #ddd; display: flex; justify-content: space-around; padding: 10px 0; z-index: 1000; }
    .nav-item-custom { text-align: center; color: #6c757d; text-decoration: none; font-size: 0.8rem; }
    .nav-item-custom.active { color: #0d6efd; font-weight: bold; }
    .page { display: none; padding-bottom: 80px; }
    .page.active { display: block; }
    .loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.7); display:none; justify-content:center; align-items:center; z-index:9999; }
  </style>
</head>
<body>

<div class="loading" id="loader"><div class="spinner-border text-primary"></div></div>

<div class="container mt-3">
  <div id="page1" class="page active">
    <h4 class="text-center mb-3">บันทึกงาน</h4>
    <button class="btn btn-dark w-100 mb-3" onclick="startScan('p1')">สแกน QR Code</button>
    <div id="reader-p1"></div>
    <div id="display-job-p1" class="job-display text-center">---</div>
    <form id="formAdd">
      <label>แผนก</label>
      <select id="dept" class="form-select mb-2" required></select>
      <label>จำนวน</label>
      <input type="number" id="amount" class="form-control mb-2" required>
      <label>หมายเหตุ</label>
      <input type="text" id="note" class="form-control mb-3">
      <button type="submit" class="btn btn-primary w-100 py-3">บันทึกข้อมูล</button>
    </form>
  </div>

  <div id="page2" class="page">
    <h4 class="text-center mb-3">STATUS</h4>
    <button class="btn btn-dark w-100 mb-3" onclick="startScan('p2')">สแกนเช็กสถานะ</button>
    <div id="reader-p2"></div>
    <div id="display-job-p2" class="job-display text-center">---</div>
    <table class="table table-bordered mt-3">
      <thead class="table-light"><tr><th>แผนก</th><th>จำนวน</th></tr></thead>
      <tbody id="statusBody"></tbody>
    </table>
  </div>

  <div id="page3" class="page">
    <h4 class="text-center mb-3">ภาพรวมงาน</h4>
    <div class="table-responsive">
      <table class="table table-striped">
        <thead><tr><th>#</th><th>รหัส</th><th>แผนก</th><th>จำนวน</th></tr></thead>
        <tbody id="overviewBody"></tbody>
      </table>
    </div>
  </div>
</div>

<nav class="nav-bottom">
  <a href="#" class="nav-item-custom active" onclick="nav('page1', this)"><div>📝</div>บันทึก</a>
  <a href="#" class="nav-item-custom" onclick="nav('page2', this)"><div>🔍</div>สถานะ</a>
  <a href="#" class="nav-item-custom" onclick="nav('page3', this)"><div>📊</div>ภาพรวม</a>
</nav>

<script>
  // *** ใส่ URL ของ Google App Script ที่ได้จากการ Deploy ที่นี่ ***
  const API_URL = "https://script.google.com/macros/s/AKfycbyK_ps3sNDuzJHU0odUoSYZMApefkPKUvb_89EqQ-0Q1gdb74DsQXA92b6k0_bNKaOB/exec"; 

  let html5QrCode;

  async function callAPI(action, data = {}) {
    document.getElementById('loader').style.display = 'flex';
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action, ...data })
      });
      const res = await response.json();
      document.getElementById('loader').style.display = 'none';
      return res.data;
    } catch (e) {
      alert("Error: " + e);
      document.getElementById('loader').style.display = 'none';
    }
  }

  // Load Departments
  window.onload = async () => {
    const depts = await callAPI('getDepartments');
    const select = document.getElementById('dept');
    depts.forEach(d => select.innerHTML += `<option value="${d}">${d}</option>`);
  };

  function nav(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item-custom').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
    if(id === 'page3') loadOverview();
    if(html5QrCode) stopScan();
  }

  function startScan(page) {
    const readerId = "reader-" + page;
    html5QrCode = new Html5Qrcode(readerId);
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
      (text) => {
        document.getElementById("display-job-" + page).innerText = text;
        stopScan();
        if(page === 'p2') loadStatus(text);
      }
    ).catch(err => alert("Camera error: " + err));
  }

  function stopScan() {
    if(html5QrCode) html5QrCode.stop();
  }

  document.getElementById('formAdd').onsubmit = async (e) => {
    e.preventDefault();
    const job = document.getElementById('display-job-p1').innerText;
    if(job === '---') return alert('กรุณาสแกนรหัสก่อน');
    const data = {
      jobCode: job,
      dept: document.getElementById('dept').value,
      amount: document.getElementById('amount').value,
      note: document.getElementById('note').value
    };
    const res = await callAPI('saveData', { data });
    alert(res);
    document.getElementById('formAdd').reset();
    document.getElementById('display-job-p1').innerText = '---';
  };

  async function loadStatus(code) {
    const data = await callAPI('getStatus', { jobCode: code });
    const body = document.getElementById('statusBody');
    body.innerHTML = data.map(r => `<tr><td>${r[0]}</td><td>${r[2]}</td></tr>`).join('');
  }

  async function loadOverview() {
    const data = await callAPI('getOverview');
    const body = document.getElementById('overviewBody');
    body.innerHTML = data.map(r => `<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td>${r[3]}</td></tr>`).join('');
  }
</script>

</body>
</html>
